<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Equanim — Math-driven animation</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0d0d12;
        color: #ccc;
        font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px;
        min-height: 100vh;
        gap: 16px;
      }

      h1 {
        color: #eee;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ── Canvas ── */
      #canvas-wrap {
        position: relative;
        border: 1px solid #2a2a35;
        border-radius: 4px;
        overflow: hidden;
      }

      canvas {
        display: block;
        cursor: crosshair;
      }

      /* ── Transport controls ── */
      .controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        background: #1e1e28;
        color: #ccc;
        border: 1px solid #3a3a4a;
        border-radius: 3px;
        padding: 5px 14px;
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        transition:
          background 0.1s,
          color 0.1s;
      }

      button:hover:not(:disabled) {
        background: #2c2c3c;
        color: #eee;
      }
      button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      #seek-bar {
        width: 320px;
        accent-color: #44aaff;
        cursor: pointer;
      }

      #time-display {
        color: #44aaff;
        min-width: 52px;
        text-align: right;
      }

      /* ── State badge ── */
      .state-badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        border: 1px solid transparent;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .state-idle {
        border-color: #444;
        color: #888;
      }
      .state-playing {
        border-color: #44aaff55;
        color: #44aaff;
      }
      .state-paused {
        border-color: #ffaa4455;
        color: #ffaa44;
      }
      .state-ended {
        border-color: #66aa6655;
        color: #66aa66;
      }

      /* ── Variables panel ── */
      #variables-panel {
        display: none; /* shown when spec has variables */
        flex-direction: column;
        gap: 8px;
        width: 100%;
        max-width: 1000px;
        background: #12121a;
        border: 1px solid #2a2a38;
        border-radius: 4px;
        padding: 14px 16px;
      }

      .var-row {
        display: grid;
        grid-template-columns: 160px 1fr 56px;
        align-items: center;
        gap: 10px;
      }

      .var-label {
        color: #aaa;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .var-slider {
        width: 100%;
        accent-color: #44aaff;
        cursor: pointer;
      }

      .var-readout {
        color: #44aaff;
        font-size: 12px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      /* ── Spec editor ── */
      .spec-panel {
        width: 100%;
        max-width: 1000px;
      }

      .spec-editor {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .spec-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .spec-toolbar label {
        color: #666;
        font-size: 12px;
      }

      select {
        background: #1e1e28;
        color: #ccc;
        border: 1px solid #3a3a4a;
        border-radius: 3px;
        padding: 5px 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
      }

      select:focus {
        outline: 1px solid #44aaff55;
      }

      textarea {
        width: 100%;
        height: 260px;
        background: #12121a;
        color: #b0c4de;
        border: 1px solid #2a2a38;
        border-radius: 3px;
        padding: 10px;
        font-family: inherit;
        font-size: 12px;
        resize: vertical;
        tab-size: 2;
      }

      textarea:focus {
        outline: 1px solid #44aaff55;
      }

      #error-display {
        display: none;
        background: #2a1010;
        border: 1px solid #aa4444;
        border-radius: 3px;
        color: #ff8888;
        padding: 8px 12px;
        font-size: 12px;
        white-space: pre-wrap;
      }

      /* ── Export / recording ── */
      .controls-divider {
        width: 1px;
        height: 18px;
        background: #2a2a3a;
      }

      #btn-export {
        border-color: #3a3a4a;
        color: #aaa;
      }

      #btn-export.recording {
        color: #ff5555;
        border-color: #ff555540;
        animation: rec-pulse 1.2s ease-in-out infinite;
      }

      @keyframes rec-pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.6; }
      }

      /* ── Site header ── */
      .site-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-align: center;
        padding-bottom: 8px;
        border-bottom: 1px solid #1e1e28;
        width: 100%;
        max-width: 1000px;
      }

      .wordmark-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .wordmark {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #eee;
      }

      .wordmark-version {
        font-size: 11px;
        color: #555;
        letter-spacing: 0.06em;
        padding: 2px 6px;
        border: 1px solid #2a2a38;
        border-radius: 3px;
      }

      .tagline {
        color: #888;
        font-size: 12px;
        letter-spacing: 0.03em;
        max-width: 520px;
        line-height: 1.5;
      }

      .concept-pills {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
      }

      .pill {
        font-size: 10px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #44aaff99;
        border: 1px solid #44aaff22;
        border-radius: 12px;
        padding: 3px 9px;
      }

      .header-links {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .github-link {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #777;
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 0.04em;
        padding: 4px 10px;
        border: 1px solid #2a2a38;
        border-radius: 3px;
        transition: color 0.15s, border-color 0.15s;
      }

      .github-link:hover {
        color: #ccc;
        border-color: #444;
      }

      .github-link svg {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="wordmark-row">
        <span class="wordmark">Equanim</span>
        <span class="wordmark-version">v0.1</span>
      </div>
      <p class="tagline">
        A declarative, math-equation-driven animation spec. Every visual property
        is an expression evaluated at runtime — no code, just JSON.
      </p>
      <div class="concept-pills">
        <span class="pill">AI-generatable</span>
        <span class="pill">Declarative JSON</span>
        <span class="pill">Physics-ready</span>
        <span class="pill">Renderer-agnostic</span>
      </div>
      <div class="header-links">
        <a class="github-link" href="https://github.com/david-sling/equanim" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
              .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
              .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
              0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          david-sling/equanim
        </a>
      </div>
    </header>

    <div id="canvas-wrap">
      <canvas id="canvas" width="1000" height="600"></canvas>
    </div>

    <div class="controls">
      <button id="btn-play">▶ Play</button>
      <button id="btn-pause" disabled>⏸ Pause</button>
      <button id="btn-reset">↺ Reset</button>
      <input id="seek-bar" type="range" min="0" max="3" step="0.01" value="0" />
      <span id="time-display">0.00s</span>
      <span id="state-display" class="state-badge state-idle">idle</span>
      <div class="controls-divider"></div>
      <button id="btn-export">⬛ Export</button>
    </div>

    <!-- Variables panel — populated by main.ts when spec has variables -->
    <div id="variables-panel"></div>

    <div class="spec-panel">
      <div class="spec-editor">
        <div class="spec-toolbar">
          <label for="spec-select">Examples</label>
          <select id="spec-select">
            <option value="dampened-wave">Dampened Wave</option>
            <option value="bouncing-ball">Bouncing Ball</option>
            <option value="double-pendulum" selected>Double Pendulum</option>
            <option value="three-body">Three-Body Problem</option>
          </select>
          <span style="color:#333">|</span>
          <button id="btn-open-file">Open file…</button>
          <input id="file-input" type="file" accept=".json" style="display:none" />
        </div>
        <textarea
          id="spec-input"
          placeholder="Paste Equanim JSON here…"
        ></textarea>
        <div id="error-display"></div>
        <button id="btn-load" style="align-self: flex-start">Load spec</button>
      </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
